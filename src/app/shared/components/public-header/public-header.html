<header class="public-header">
  <div class="header-container">
    <button
      type="button"
      class="brand"
      (click)="goTo('/')"
    >
      JM Pormar
    </button>

    <nav class="nav" [class.open]="isMenuOpen">
      <button
        type="button"
        (click)="goTo('/')"
      >
        Inicio
      </button>

      <button
        type="button"
        (click)="goTo('/nosotros', 'nosotros-principal')"
      >
        Nosotros
      </button>

      <button
        type="button"
        (click)="goTo('/productos', 'catalogo')"
      >
        Productos
      </button>

      <button
        type="button"
        (click)="goTo('/servicios', 'servicios-principales')"
      >
        Servicios
      </button>

      <button
        type="button"
        (click)="goTo('/contacto', 'contacto-principal')"
      >
        Contáctanos
      </button>
    </nav>

    <div class="header-actions">
      <button
        type="button"
        class="menu-button"
        aria-label="Abrir o cerrar menú"
        (click)="toggleMenu()"
      >
        <span class="material-symbols-outlined">
          {{ isMenuOpen ? 'close' : 'menu' }}
        </span>
      </button>
    </div>
  </div>
</header>

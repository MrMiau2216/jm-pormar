<header class="public-header">
  <div class="header-container">
    <button
      type="button"
      class="brand"
      (click)="goToSection('inicio')"
    >
      JM Pormar
    </button>

    <nav
      class="nav"
      [class.open]="isMenuOpen"
      aria-label="Navegación principal"
    >
      <button
        type="button"
        (click)="goToSection('inicio')"
      >
        Inicio
      </button>

      <button
        type="button"
        (click)="goToSection('nosotros')"
      >
        Nosotros
      </button>

      <button
        type="button"
        (click)="goToSection('productos')"
      >
        Productos
      </button>

      <button
        type="button"
        (click)="goToSection('servicios')"
      >
        Servicios
      </button>

      <button
        type="button"
        (click)="goToSection('certificaciones')"
      >
        Certificaciones
      </button>

      <button
        type="button"
        (click)="goToSection('contacto')"
      >
        Contáctanos
      </button>
    </nav>

    <div class="header-actions">
      <button
        type="button"
        class="menu-button"
        aria-label="Abrir o cerrar menú"
        (click)="toggleMenu()"
      >
        <span class="material-symbols-outlined">
          {{ isMenuOpen ? 'close' : 'menu' }}
        </span>
      </button>
    </div>
  </div>
</header>
